<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body class="manage-body">
  <main class="manage-page">
    <section class="manage-shell" id="manage-shell">
      <section class="panel manage-auth" id="manage-auth">
        <p class="hero-kicker">Admin Access</p>
        <h1>后台管理</h1>
        <p class="manage-copy">队列推进、营业时间和节假日都在这里调整，首页不会显示这个入口。</p>

        <form class="manage-form" id="login-form">
          <label class="field">
            <span>管理员密码</span>
            <input class="input" id="password-input" type="password" autocomplete="current-password" required>
          </label>

          <button class="take-number-btn" id="login-btn" type="submit">登录后台</button>
          <p class="status-text" id="auth-status"></p>
        </form>
      </section>

      <section class="manage-panel" id="manage-panel" hidden>
        <header class="panel manage-header">
          <div>
            <p class="hero-kicker">Admin Console</p>
            <h1>队列控制台</h1>
          </div>
          <button class="secondary-btn" id="logout-btn" type="button">退出登录</button>
        </header>

        <div class="manage-grid">
          <section class="panel manage-block">
            <div class="section-head">
              <h2>当前状态</h2>
              <p id="business-status-text">正在读取最新状态。</p>
            </div>

            <div class="summary-row manage-summary">
              <article class="summary-box">
                <span>当前办理中</span>
                <strong id="admin-current-task">暂无</strong>
              </article>
              <article class="summary-box">
                <span>队列剩余</span>
                <strong id="admin-pending-count">0</strong>
              </article>
              <article class="summary-box">
                <span>最后发号</span>
                <strong id="admin-last-issued">A0000</strong>
              </article>
              <article class="summary-box">
                <span>已办理到</span>
                <strong id="admin-completed-no">A0000</strong>
              </article>
            </div>

            <div class="manage-actions">
              <button class="take-number-btn" id="advance-btn" type="button">结束当前任务并办理下一位</button>
              <p class="status-text" id="advance-status"></p>
            </div>
          </section>

          <section class="panel manage-block">
            <div class="section-head">
              <h2>基础配置</h2>
              <p>修改后前台轮询会自动同步。</p>
            </div>

            <form class="manage-form" id="settings-form">
              <div class="manage-form-grid">
                <label class="field">
                  <span>每日处理能力</span>
                  <input class="input" id="daily-capacity-input" type="number" min="1" required>
                </label>
                <label class="field">
                  <span>营业开始</span>
                  <input class="input" id="hours-start-input" type="time" required>
                </label>
                <label class="field">
                  <span>营业结束</span>
                  <input class="input" id="hours-end-input" type="time" required>
                </label>
              </div>

              <div class="manage-actions">
                <button class="secondary-btn" id="save-settings-btn" type="submit">保存基础配置</button>
                <p class="status-text" id="settings-status"></p>
              </div>
            </form>
          </section>

          <section class="panel manage-block">
            <div class="section-head">
              <h2>节假日与调休</h2>
              <p>一行一个日期，格式固定为 YYYY-MM-DD。</p>
            </div>

            <form class="manage-form" id="calendar-form">
              <div class="manage-form-grid manage-form-grid-wide">
                <label class="field">
                  <span>节假日</span>
                  <textarea class="input textarea" id="holidays-input" rows="8" placeholder="2026-05-01"></textarea>
                </label>
                <label class="field">
                  <span>调休日</span>
                  <textarea class="input textarea" id="workdays-input" rows="8" placeholder="2026-05-09"></textarea>
                </label>
              </div>

              <div class="manage-actions">
                <button class="secondary-btn" id="save-calendar-btn" type="submit">保存日历配置</button>
                <p class="status-text" id="calendar-status"></p>
              </div>
            </form>
          </section>

          <section class="panel manage-block manage-queue">
            <div class="section-head">
              <h2>等待队列</h2>
              <p>加急任务会显示在队列前面。</p>
            </div>

            <div class="queue-table" id="queue-table"></div>
          </section>
        </div>
      </section>
    </section>
  </main>

  <script src="/manage.js"></script>
</body>
</html>
